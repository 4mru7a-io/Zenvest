version: '3.8'

services:
  zenvest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenvest-app
    ports:
      - "3000:3000"
    environment:
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_POLYGON_API_KEY=${VITE_POLYGON_API_KEY}
      - VITE_ALPHA_VANTAGE_KEY=${VITE_ALPHA_VANTAGE_KEY}
      - VITE_IEX_API_KEY=${VITE_IEX_API_KEY}
      - VITE_FINNHUB_API_KEY=${VITE_FINNHUB_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error('Health check failed')})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Add nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: zenvest-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - zenvest
    restart: unless-stopped
    profiles:
      - production
